<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>关系图谱</title>
  __VIS_NETWORK_CSS__
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f8fafc;
      font-family: "Microsoft YaHei", sans-serif;
    }

    #graph-network {
      width: 100%;
      height: 100vh;
      background: radial-gradient(circle at top, rgba(255, 255, 255, 0.96) 0%, rgba(241, 245, 249, 0.98) 100%);
    }

    .vis-tooltip {
      max-width: 320px;
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.12);
      white-space: pre-line;
      line-height: 1.5;
    }

    .graph-zoom-panel {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }

    .graph-zoom-glass {
      background:
        linear-gradient(180deg, rgba(182, 191, 204, 0.14) 0%, rgba(148, 163, 184, 0.1) 100%);
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.12),
        0 6px 14px rgba(15, 23, 42, 0.14),
        0 1px 0 rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px) saturate(138%);
    }

    .graph-zoom-panel__row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      min-height: 34px;
      order: 1;
    }

    .graph-zoom-rail {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: max-content;
      min-height: 48px;
      padding: 6px 24px;
      border-radius: 999px;
      order: 2;
    }

    .graph-zoom-rail__inner {
      position: relative;
      display: flex;
      align-items: center;
      width: 284px;
      height: 40px;
    }

    .graph-zoom-panel__value {
      position: absolute;
      top: 35px;
      left: 0;
      transform: translateX(-50%);
      color: #6b7280;
      font-size: 10px;
      font-weight: 600;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0;
      text-shadow: 0 1px 2px rgba(255, 255, 255, 0.45);
      opacity: 0.95;
      pointer-events: none;
      white-space: nowrap;
    }

    .graph-zoom-svg {
      display: block;
      width: 100%;
      height: 40px;
      overflow: visible;
    }

    .graph-zoom-range {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
      margin: 0;
    }

    .graph-fit-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      width: 34px;
      height: 34px;
      padding: 0;
      border-radius: 50%;
      color: #1f66d1;
      cursor: pointer;
    }

    .graph-fit-btn svg {
      width: 16px;
      height: 16px;
      display: block;
    }
  </style>
</head>
<body>
  <div id="graph-network"></div>
  <div class="graph-zoom-panel" id="graph-zoom-panel">
    <div class="graph-zoom-panel__row">
      <button class="graph-fit-btn graph-zoom-glass" id="graph-fit-btn" type="button" title="适应视图" aria-label="适应视图">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <circle cx="12" cy="12" r="3.25" fill="none" stroke="currentColor" stroke-width="1.8"></circle>
          <path d="M12 3.5V7M12 17V20.5M3.5 12H7M17 12H20.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
        </svg>
      </button>
    </div>
    <div class="graph-zoom-rail graph-zoom-glass">
      <div class="graph-zoom-rail__inner">
        <svg class="graph-zoom-svg" id="graph-zoom-svg" viewBox="0 0 284 40" aria-hidden="true" focusable="false">
          <g id="graph-zoom-ticks"></g>
          <line x1="0" y1="20" x2="284" y2="20" stroke="rgba(15,23,42,0.42)" stroke-width="0.5"></line>
          <polygon id="graph-threshold-marker" points="0,20 -6,9 6,9" fill="rgba(255,110,110,0.66)"></polygon>
          <circle id="graph-zoom-marker" cx="0" cy="20" r="6" fill="rgba(100,170,255,0.52)" stroke="rgba(160,210,255,0.72)" stroke-width="1"></circle>
        </svg>
        <span class="graph-zoom-panel__value" id="graph-zoom-value">--</span>
        <input class="graph-zoom-range" id="graph-zoom-slider" type="range" min="0.4" max="3" step="0.01" value="1">
        <input class="graph-zoom-range" id="graph-threshold-slider" type="range" min="0.4" max="3" step="0.01" value="1.6">
      </div>
    </div>
  </div>
  __GRAPH_DATA_SCRIPT__
  <script>
    window.KG_GRAPH_OPTIONS = __GRAPH_OPTIONS__;
  </script>
  __VIS_NETWORK_JS__
  <script>
__GRAPH_VIEWER_RUNTIME__
  </script>
</body>
</html>
