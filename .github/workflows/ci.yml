name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run Python tests
        run: python -m pytest -q

  frontend-checks:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node dependencies
        run: npm.cmd ci

      - name: Run frontend tests
        run: npm.cmd test

      - name: Build renderer
        run: npm.cmd run build:renderer

  script-sanity:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          npm.cmd ci

      - name: Check Python scripts
        run: |
          python -m py_compile scripts/build_backend.py
          python -m compileall -q relation_graph scripts tests

      - name: Check Node script syntax
        run: |
          node --check electron/main.js
          node --check electron/preload.js
          node --check electron/python-worker-client.js
          node --check scripts/run_build_backend.js
